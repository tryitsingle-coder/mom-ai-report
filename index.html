<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Report｜0706 收盤更新</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">MOM AI REPORT · PUBLIC MODE</p>
        <h1>0706 收盤更新</h1>
        <p class="sub">防守優先：強股回測才低接，弱股反彈先減壓。</p>
      </div>
      <div class="stamp" id="versionStamp"></div>
    </header>

    <section class="cards" id="summaryCards"></section>

    <section class="panel">
      <div class="panel-title">
        <h2>明日低接前五順位</h2>
        <span>小量分批，不追開高</span>
      </div>
      <div class="table-wrap">
        <table id="levelsTable"></table>
      </div>
    </section>

    <section class="panel danger">
      <div class="panel-title">
        <h2>警戒與反彈減壓名單</h2>
        <span>不列積極低接</span>
      </div>
      <div class="warning-grid" id="warningGrid"></div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>類股燈號</h2>
        <span>0706 收盤分類</span>
      </div>
      <div class="sector-grid" id="sectorGrid"></div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>焦點報價表</h2>
        <span>依 0706 收盤 DDE</span>
      </div>
      <div class="table-wrap">
        <table id="focusTable"></table>
      </div>
    </section>

    <section class="panel note">
      <h2>明日操作規則</h2>
      <ol>
        <li>開高先不要追，等 09:05～09:15 是否站穩。</li>
        <li>PCB/ABF 與高價 AI 鏈若只是弱反彈，先減壓，不攤平。</li>
        <li>低接只做相對強股回測：台積電、聯發科、京元、力成、亞力。</li>
        <li>若台積電跌破 2435 且站不回，所有短打買單降級保守。</li>
      </ol>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
